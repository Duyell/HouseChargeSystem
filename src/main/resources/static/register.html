<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="css/register-style.css" >
</head>
<body>
<div class="register-container">
    <h2 class="register-title">用户注册</h2>
    <form class="register-form" id="registerForm">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" placeholder="请输入姓名" required>
            <div class="error-message" id="nameError">请输入正确的姓名</div>
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="tel" id="phone" placeholder="请输入手机号" required>
            <div class="error-message" id="phoneError">请输入正确的手机号</div>
        </div>
        <div class="form-group">
            <label for="idCard">身份证号</label>
            <input type="text" id="idCard" placeholder="请输入身份证号" required>
            <div class="error-message" id="idCardError">请输入正确的身份证号</div>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" required>
            <div class="error-message" id="passwordError">密码长度不能少于6位</div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            <div class="error-message" id="confirmError">两次密码输入不一致</div>
        </div>
        <button type="submit" class="register-btn">注册</button>
        <div class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </form>
</div>

<script src="js/register-script.js"></script>
</body>
</html>
